<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Rádio Trem AI</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 2rem; }
    #track { font-size: 1.2rem; margin-top: 1rem; }
    #announcement { color: #555; margin-top: 0.5rem; }
    button { margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Rádio Trem AI</h1>
  <audio id="player" controls autoplay src=""></audio>
  <div id="track">Carregando...</div>
  <div id="announcement"></div>
  <button id="shuffle">tocar diferente</button>

  <h2>Gerar locução</h2>
  <div>
    <input id="ann-text" type="text" placeholder="Digite a frase" style="width:80%" />
    <button id="ann-generate">Gerar</button>
  </div>
  <div id="ann-result" style="margin-top:1rem"></div>

  <script>
    const STREAM_URL = (window.ICECAST_STREAM || '');
    const player = document.getElementById('player');
    document.getElementById('shuffle').addEventListener('click', async () => {
      try {
        await fetch('/skip', { method: "POST" });
      } catch (err) {
        console.error(err);
      }
    });
    player.src = STREAM_URL;

    async function refresh() {
      try {
        const resp = await fetch('/now_playing');
        const data = await resp.json();
        document.getElementById('track').textContent = `${data.title} – ${data.artist}`;
        document.getElementById('announcement').textContent = data.announcement;
      } catch (err) {
        console.error(err);
      }
    }

    refresh();
    setInterval(refresh, 5000);

    document.getElementById('ann-generate').addEventListener('click', async () => {
      const text = document.getElementById('ann-text').value;
      if (!text) return;
      try {
        const resp = await fetch('/generate_announcement', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const container = document.getElementById('ann-result');
        container.innerHTML = `<audio controls src="${url}"></audio><br/><a href="${url}" download="announcement.wav">Baixar</a>`;
      } catch (err) {
        console.error(err);
      }
    });
  </script>
</body>
</html>
